<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProAnalog — Results</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .wrap { width: 100%; max-width: 760px; }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }

    .block {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 10px;
    }

    .question { font-size: 16px; color: #c7d2fe; font-style: italic; line-height: 1.6; }

    .prose { line-height: 1.7; font-size: 15px; color: #cbd5e1; }
    .prose h1, .prose h2, .prose h3 { color: #f1f5f9; margin: 1.2em 0 0.4em; }
    .prose p { margin-bottom: 0.9em; }
    .prose ul, .prose ol { padding-left: 1.4em; margin-bottom: 0.9em; }
    .prose li { margin-bottom: 0.3em; }
    .prose code {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      font-size: 13px;
      color: #a5b4fc;
    }
    .prose pre {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    .prose pre code { border: none; padding: 0; background: none; font-size: 13px; }
    .prose table { border-collapse: collapse; width: 100%; margin-bottom: 1em; font-size: 14px; }
    .prose th, .prose td { border: 1px solid #2d3148; padding: 8px 12px; text-align: left; }
    .prose th { background: #0f1117; color: #94a3b8; }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #475569; }

    .btn {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }

    .status { margin-top: 10px; font-size: 13px; min-height: 18px; }

    .hint {
      margin-top: 12px;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      font-size: 12px;
      color: #475569;
    }
    .hint code {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 11px;
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">&#128202;</div>
      <h1>ProAnalog</h1>
    </div>

    <div class="block">
      <div class="label">Question</div>
      <div class="question" id="qText"></div>
    </div>

    <div class="block">
      <div class="label">Response</div>
      <div class="prose" id="responseEl"></div>
    </div>

    <div class="block">
      <div class="label">Ask a follow-up</div>
      <textarea id="followup" rows="4"
        placeholder="e.g. Can you show just the stack traces from those errors?"></textarea>
      <button class="btn" onclick="askFollowup()">Generate follow-up input.json</button>
      <div class="status" id="status"></div>
      <div class="hint">
        Save the downloaded <code>input.json</code> to the <code>ProAnalog\</code> folder, then
        from a <strong>proenv</strong> session at your workspace root run:<br><br>
        <code>_progres -b -assemblies . -propath ".,ProAnalog,%DLC%\gui\netlib\OpenEdge.net.pl" -p ProAnalog\RunAnalysis.p</code>
      </div>
    </div>
  </div>

  <script>
    const QUESTION = %%QUESTION_JS%%;
    const HISTORY  = %%HISTORY_JSON%%;

    document.getElementById('qText').textContent = QUESTION;
    document.getElementById('responseEl').innerHTML =
      marked.parse(HISTORY[HISTORY.length - 1].content);

    function askFollowup() {
      const q      = document.getElementById('followup').value.trim();
      const status = document.getElementById('status');
      if (!q) {
        status.style.color = '#f87171';
        status.textContent = 'Please enter a question.';
        return;
      }
      const data = { mode: 'followup', prompt: q, history: HISTORY };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'input.json';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
      status.style.color = '#34d399';
      status.textContent = 'input.json downloaded — save to ProAnalog\\ then re-run from proenv.';
    }
  </script>
</body>
</html>
